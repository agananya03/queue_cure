<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0A1628]">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🏥%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0066CC" />
    <title>Queue Cure - Hospital Queue Management</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              navy: {
                950: '#0A1628',
                900: '#0B1E36',
                800: '#11294A',
                700: '#173760',
                600: '#1E477A',
                500: '#2A5D9E',
                400: '#477CBF',
                300: '#75A4DF',
                200: '#AECDF6',
                100: '#E0EEFF',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              heading: ['"DM Sans"', 'sans-serif']
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-slow': 'bounce 2s infinite',
            }
          }
        }
      }
    </script>
    
    <!-- Custom CSS for Scrollbars & animations -->
    <style type="text/css">
      * {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar styling for a premium feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B1E36;
      }
      ::-webkit-scrollbar-thumb {
        background: #1E477A;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2A5D9E;
      }
      /* Soft glowing backdrop elements */
      .glow-bg {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, rgba(13,148,136,0) 70%);
        top: -10%;
        left: -10%;
        pointer-events: none;
        z-index: 0;
      }
      .glow-bg-secondary {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, rgba(13,148,136,0) 70%);
        bottom: -10%;
        right: -10%;
        pointer-events: none;
        z-index: 0;
      }
    </style>
  </head>
  <body class="h-full text-slate-100 antialiased overflow-x-hidden relative">
    <div class="glow-bg"></div>
    <div class="glow-bg-secondary"></div>
    
    <div id="root" class="min-h-full flex flex-col relative z-10"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
